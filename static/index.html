<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Sentiment Pulse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Tailwind slategray-900 */
            color: #f8fafc;
        }
        h1, h2, h3, .heading-font {
            font-family: 'Outfit', sans-serif;
        }
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        /* Neon text colors */
        .neon-green {
            color: #4ade80;
            text-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
        }
        .neon-red {
            color: #f87171;
            text-shadow: 0 0 8px rgba(248, 113, 113, 0.4);
        }
        .neon-gray {
            color: #94a3b8;
        }
        
        /* Progress bar animation */
        .progress-bar-fill {
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
        
        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .live-indicator {
            animation: pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="min-h-screen antialiased flex flex-col items-center">

    <!-- Header -->
    <header class="w-full relative z-10 glass-panel border-b-0 border-slate-700/50 py-4 mb-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-purple-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
                <h1 class="text-2xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">
                    Sentiment<span class="text-indigo-400">Pulse</span>
                </h1>
            </div>
            <div class="flex items-center gap-2 text-sm font-medium text-slate-400 bg-slate-800/50 px-4 py-2 rounded-full border border-slate-700">
                <span class="w-2 h-2 rounded-full bg-green-500 live-indicator shadow-[0_0_8px_#22c55e]"></span>
                Live Twitter Feed Processing
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex-grow pb-12 flex flex-col md:flex-row gap-8">
        
        <!-- Left Column: Trending Overview -->
        <section class="w-full md:w-1/3 flex flex-col gap-6">
            <h2 class="text-xl font-bold text-slate-200 heading-font flex items-center gap-2">
                <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z"></path></svg>
                Market Prediction
            </h2>
            
            <div id="loadingStates" class="glass-panel rounded-2xl p-6 flex flex-col items-center justify-center min-h-[300px]">
                <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="mt-4 text-slate-400 text-sm font-medium animate-pulse">Aggregating real-time sentiment...</p>
            </div>
            
            <div id="trendingContainer" class="flex flex-col gap-4 hidden">
                <!-- Trending cards injected here -->
            </div>
        </section>

        <!-- Right Column: Detail View (Tweets Feed) -->
        <section class="w-full md:w-2/3 flex flex-col gap-6">
            <div class="flex justify-between items-center bg-slate-800/30 rounded-2xl p-2 border border-slate-700/50">
                <div class="px-4 py-2">
                    <h2 class="text-lg font-bold text-slate-300 heading-font" id="selectedTickerHeader">Select a Ticker</h2>
                </div>
                <div class="text-xs text-slate-500 font-medium px-4">
                    Latest <span class="text-slate-300 font-bold" id="tweetCountLabel">0</span> Tweets
                </div>
            </div>
            
            <div id="tweetsContainer" class="flex flex-col gap-4 overflow-y-auto pr-2 max-h-[700px]">
                <div class="glass-panel rounded-xl p-8 text-center text-slate-500 flex flex-col items-center justify-center border-dashed">
                    <svg class="w-12 h-12 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                    <p>Click on any stock ticker from the Market Prediction panel to view its real-time sentiment stream.</p>
                </div>
            </div>
        </section>
        
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
